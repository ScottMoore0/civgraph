name: Command runner (read-only context dump)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: LFS (if available)
        run: |
          set -euo pipefail
          if command -v git-lfs >/dev/null 2>&1; then
            git lfs install
            git lfs pull || true
          fi

      - name: Create context dump file
        run: |
          set -euo pipefail
          OUT="context_dump.txt"

          {
            echo "=== CONTEXT DUMP (READ ONLY) ==="
            echo "Repo: $GITHUB_REPOSITORY"
            echo "Run:  $GITHUB_RUN_ID"
            echo "Time: $(date -u)"
            echo

            echo "---- git ----"
            git rev-parse --show-toplevel
            echo "HEAD: $(git rev-parse --short HEAD)"
            git status --porcelain=v1 || true
            echo

            echo "---- branches ----"
            git fetch --all --prune
            git branch -a || true
            echo

            echo "---- recent commits ----"
            git --no-pager log --oneline -n 50 || true
            echo

            echo "---- codex branches: unique commits + files changed ----"
            MAIN_REF="origin/main"
            if ! git show-ref --verify --quiet refs/remotes/origin/main; then MAIN_REF="main"; fi
            echo "Main ref: $MAIN_REF"
            echo

            git branch -r | grep 'codex/' || echo "(no codex branches)"
            echo

            for b in $(git branch -r | grep 'codex/' | sed 's|origin/||'); do
              echo "== $b =="
              echo "-- commits --"
              git --no-pager log --oneline --no-merges "$MAIN_REF..origin/$b" || true
              echo "-- files --"
              git --no-pager diff --name-status "$MAIN_REF..origin/$b" || true
              echo
            done

            echo "---- Dublin FGB check ----"
            DUBLIN="data/maps/local-government/Dublin_Electoral_Counties_1985.fgb"
            if [ -f "$DUBLIN" ]; then
              echo "Exists: $DUBLIN"
              echo "Bytes: $(wc -c < "$DUBLIN" | tr -d ' ')"
              python3 -c "p='$DUBLIN'; h=open(p,'rb').read(80); print('Head:',h); print('Looks like:', 'LFS_POINTER' if h.startswith(b'version https://git-lfs.github.com/spec') else 'BINARY_OK')"
            else
              echo "(missing) $DUBLIN"
            fi
            echo

            echo "---- .gitattributes ----"
            if [ -f .gitattributes ]; then
              sed -n '1,200p' .gitattributes
              echo
              echo "Lines mentioning fgb/lfs:"
              grep -nEi 'fgb|lfs|flatgeobuf' .gitattributes || echo "(none)"
            else
              echo "(no .gitattributes)"
            fi
            echo

            echo "---- maps.json: Dublin references ----"
            if [ -f data/database/maps.json ]; then
              grep -n "Dublin" data/database/maps.json || true
              grep -n "Electoral_Counties" data/database/maps.json || true
              grep -n "Dublin_Electoral_Counties" data/database/maps.json || true
            else
              echo "(missing) data/database/maps.json"
            fi
            echo

            echo "---- quick greps (search/timeline/export/census) ----"
            rg -n "setupSearch|onSearch|autocomplete|Fuse|searchQuery|updateMapList|debounce|throttle" js assets data 2>/dev/null | sed -n '1,200p' || true
            echo
            rg -n "TimeSliderController|timeSlider|timeline|setElectionDates" js 2>/dev/null | sed -n '1,200p' || true
            echo
            rg -n "export|download|canvas|toDataURL|html2canvas|domtoimage|MediaRecorder|gif|webm|mp4" js assets 2>/dev/null | sed -n '1,200p' || true
            echo
            rg -n "census|NISRA|Small Area|Output Area|conditional|legend|palette|quantile|breaks" js data assets 2>/dev/null | sed -n '1,200p' || true
            echo

            echo "=== END ==="
          } > "$OUT"

          echo "Wrote $OUT"
          wc -l "$OUT" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: context_dump
          path: context_dump.txt
